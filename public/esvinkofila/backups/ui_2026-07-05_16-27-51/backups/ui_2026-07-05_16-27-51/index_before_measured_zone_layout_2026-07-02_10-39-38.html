<!doctype html>
<html lang="ka">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drivelab Theory</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#d7d7d7;color:#fff}
.wrap{max-width:1500px;margin:0 auto;padding:0}
.app{min-height:100vh;background:#d7d7d7}
.top{display:none}
.card{background:#d7d7d7;overflow:hidden}
.media{position:relative;margin:0 auto;width:100%;max-width:1500px;background:#d7d7d7;overflow:hidden}
.media img{display:block;width:100%;height:auto;object-fit:contain}
.media:after{
 content:"#" attr(data-ticket);
 position:absolute;left:14px;top:14px;z-index:50;
 width:78px;height:62px;display:grid;place-items:center;
 background:rgba(0,0,0,.55);color:#fff;font-size:24px;font-weight:950;
}

/* ყველა ფოტოიან კითხვაზე კითხვა/პასუხები ზემოდან ჯდება, ფოტოს არ ვჭრით */
.media .qOverlay{
 position:absolute!important;
 left:24px;right:24px;bottom:174px;z-index:20;
 min-height:94px;
 padding:22px 26px;
 display:flex!important;
 align-items:center;
 justify-content:center;
 text-align:center;
 font-size:22px;
 line-height:1.4;
 font-weight:950;
 color:#fff;
 background:rgba(5,35,43,.88);
 border:2px solid rgba(255,255,255,.75);
}

.content{padding:0}
.answers{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:0;
 background:#fff;
}
.media + .content .answers{
 position:absolute;
 left:24px;right:24px;bottom:24px;z-index:25;
}
.answer{
 position:relative;
 min-height:70px;
 padding:16px 34px 16px 78px;
 border:0;
 border-right:2px solid #fff;
 border-bottom:2px solid #fff;
 border-radius:0;
 background:linear-gradient(135deg,rgba(4,34,43,.94),rgba(18,76,89,.94));
 color:#fff;
 font-size:17px;
 line-height:1.35;
 font-weight:900;
 text-align:left;
 cursor:pointer;
}
.answer:nth-child(2n){border-right:0}
.num{
 position:absolute;left:16px;top:50%;transform:translateY(-50%);
 width:42px;height:38px;
 display:grid;place-items:center;
 background:#fff;color:#073946;
 font-size:26px;font-weight:950;
}
.radio{display:none}
.answer.correct{background:linear-gradient(135deg,#15803d,#14532d)!important}
.answer.wrong{background:linear-gradient(135deg,#b91c1c,#7f1d1d)!important}

.noImageQuestion{
 margin:0;
 padding:42px 34px;
 text-align:center;
 font-size:26px;
 line-height:1.45;
 font-weight:950;
 background:#073946;
 border-top:3px solid #fff;
 border-bottom:3px solid #fff;
}

.next{
 display:block;
 margin:22px auto;
 min-width:280px;
 padding:18px 34px;
 border-radius:12px;
 background:#fff;
 color:#073946;
 border:0;
 font-size:20px;
 font-weight:950;
 cursor:pointer;
}

.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.76);z-index:9999;padding:22px}
.modal.show{display:flex}
.box{width:min(650px,100%);background:#071b22;border:2px solid #fff;padding:30px;color:#fff}
.box p{line-height:1.7}
.box button{width:100%;padding:16px;border:0;background:#fff;color:#073946;font-weight:950}

@media(max-width:820px){
 .media .qOverlay{left:12px;right:12px;bottom:188px;min-height:82px;padding:14px;font-size:14px}
 .media + .content .answers{left:12px;right:12px;bottom:12px}
 .answers{grid-template-columns:1fr}
 .answer{min-height:48px;padding:12px 16px 12px 58px;font-size:13px;border-right:0}
 .num{left:10px;width:34px;height:30px;font-size:20px}
}
</style>
</head>
<body>
<div class="wrap">
 <div class="app">
  <div class="top">
   <div class="panel logo"><b>Drivelab</b><span>Adaptive premium theory exam</span></div>
   <div class="panel"><div class="timer" id="timer">30:00</div><div class="progress"><i id="progress"></i></div></div>
   <div class="panel"><div class="stats"><div>სწორი <b class="good" id="rightCount">0</b></div><div>არასწორი <b class="bad" id="wrongCount">0</b></div></div></div>
  </div>
  <div class="card">
   <div class="media" id="media"><img id="mainMedia" src=""><div class="qOverlay" id="qOverlay"></div></div>
   <div class="content" id="content"><div id="questionSlot"></div><div class="answers" id="answers"></div><button class="next" onclick="nextQuestion()">შემდეგი კითხვა ›</button></div>
  </div>
 </div>
</div>
<div class="modal" id="resultModal"><div class="box"><h2 id="resultTitle"></h2><p id="resultText"></p><button onclick="location.reload()">ახალი გამოცდა</button></div></div>

<script>
let questions=[],examQuestions=[],current=0,locked=false,right=0,wrong=0,answered=0,timeLeft=1800,finished=false;
const TOTAL=30,PASS=25,MAX_WRONG=5;
const $=id=>document.getElementById(id);
const media=$('media'),img=$('mainMedia'),qOverlay=$('qOverlay'),qSlot=$('questionSlot'),answers=$('answers'),content=$('content'),progress=$('progress'),timer=$('timer'),rightEl=$('rightCount'),wrongEl=$('wrongCount');

function asset(p){return p?p.replace(/^\/+/,''):''}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function isSignTopic(q){
  const id = Number(q.topic_id);
  const txt = ((q.topic_name||'')+' '+(q.question||'')).toLowerCase();
  return (id>=3 && id<=9)
    || txt.includes('საგზაო ნიშ')
    || txt.includes('ნიშანი')
    || txt.includes('ნიშნის')
    || txt.includes('მოცემული საგზაო');
}
function cutoffClass(q){
  const len=(q.question||'').length;
  const ansCount=(q.answers||[]).filter(a=>a.text).length;
  if(len>120 || ansCount>=4) return 'cutoff-3';
  if(len>75 || ansCount>=3) return 'cutoff-2';
  return 'cutoff-1';
}

fetch('data/questions.json?v='+Date.now()).then(r=>r.json()).then(d=>{questions=d;examQuestions=shuffle(d).slice(0,TOTAL);render();startTimer()});

function render(){
 locked=false;
 const q=examQuestions[current]; if(!q)return;
 const hasImage=!!q.image;
 const signMode=hasImage && isSignTopic(q);

 media.className='media';
 media.dataset.ticket = q.ticket_number || q.id || (current+1);
 media.classList.add(signMode?'signMode':'normalMode');
 media.classList.add(cutoffClass(q));

 if(hasImage){
  media.style.display='block';
  img.src=asset(q.image);

  qOverlay.style.display = 'flex';
  qOverlay.textContent = q.question;
  qSlot.innerHTML = '';
 }else{
  media.style.display='none';
  img.removeAttribute('src');
  qSlot.innerHTML='<div class="noImageQuestion">'+q.question+'</div>';
 }

 const next=document.querySelector('.next');
 if(hasImage){
  if(answers.parentElement!==media) media.appendChild(answers);
 }else{
  if(answers.parentElement!==content) content.insertBefore(answers,next);
 }

 answers.innerHTML='';
 q.answers.forEach((a,i)=>{
  let b=document.createElement('button');
  b.className='answer';
  b.innerHTML=`<span class="num">${i+1}</span><span>${a.text}</span><span class="radio"></span>`;
  b.onclick=()=>choose(b,a,q);
  answers.appendChild(b);
 });
}

function choose(btn,a,q){
 if(locked||finished)return;
 locked=true;answered++;
 document.querySelectorAll('.answer').forEach(b=>b.disabled=true);
 if(a.is_correct){btn.classList.add('correct');right++}
 else{btn.classList.add('wrong');wrong++;[...answers.children].forEach((b,i)=>{if(q.answers[i]?.is_correct)b.classList.add('correct')})}
 update();
 if(wrong>MAX_WRONG)setTimeout(()=>finish(false),700);
 else if(answered>=TOTAL)setTimeout(()=>finish(right>=PASS),700);
}

function nextQuestion(){if(finished)return;if(answered>=TOTAL){finish(right>=PASS);return}current=(current+1)%examQuestions.length;render()}
function update(){rightEl.textContent=right;wrongEl.textContent=wrong;progress.style.width=Math.min(100,answered/TOTAL*100)+'%'}
function startTimer(){setInterval(()=>{if(finished)return;timeLeft--;let m=String(Math.floor(timeLeft/60)).padStart(2,'0'),s=String(timeLeft%60).padStart(2,'0');timer.textContent=m+':'+s;if(timeLeft<=0)finish(right>=PASS)},1000)}
function finish(pass){finished=true;$('resultTitle').textContent=pass?'გილოცავთ, გამოცდა ჩაბარებულია!':'გამოცდა ვერ ჩააბარეთ';$('resultText').textContent=`სწორი: ${right}/${TOTAL}, არასწორი: ${wrong}. ჩასაბარებლად საჭიროა ${PASS}.`;$('resultModal').classList.add('show')}
</script>
</body>
</html>
