<!doctype html>
<html lang="ka">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drivelab Theory</title>
<style>
*{box-sizing:border-box}
:root{
 --bg:#071b22;
 --panel:#06232c;
 --panel2:#0b3b47;
 --line:#f4f7f8;
 --text:#ffffff;
 --muted:#c9d8dd;
 --good:#22c55e;
 --bad:#ef4444;
}
body{
 margin:0;
 font-family:Arial,sans-serif;
 background:#071b22;
 color:var(--text);
}
.wrap{max-width:1500px;margin:0 auto;padding:0}
.app{background:#071b22;min-height:100vh}
.top{
 display:grid;
 grid-template-columns:1fr 1fr 1fr;
 gap:10px;
 padding:14px;
 background:#06151a;
 border-bottom:2px solid rgba(255,255,255,.35);
}
.panel{
 padding:14px 18px;
 background:linear-gradient(180deg,#0b3540,#061f27);
 border:1px solid rgba(255,255,255,.22);
}
.logo b{font-size:24px}
.logo span{display:block;color:var(--muted);font-size:13px;margin-top:4px}
.timer{font-size:30px;font-weight:950}
.stats{display:flex;gap:18px;justify-content:flex-end}
.stats b{font-size:28px}
.good{color:#86efac}
.bad{color:#fecaca}
.progress{height:8px;background:rgba(255,255,255,.15);margin-top:10px;overflow:hidden}
.progress i{display:block;height:100%;width:0;background:#fff}

.card{
 border:0;
 border-radius:0;
 overflow:hidden;
 background:#071b22;
}
.media{
 position:relative;
 margin:0;
 max-width:none;
 width:100%;
 border-radius:0;
 background:#d4d4d4;
 box-shadow:none;
 overflow:hidden;
}
.media img{
 display:block;
 width:100%;
 height:345px;
 object-fit:cover;
 object-position:top center;
 background:
  repeating-linear-gradient(-45deg,#d6d6d6 0,#d6d6d6 3px,#d0d0d0 3px,#d0d0d0 6px);
}
.media:before{
 content:"#";
 position:absolute;
 left:14px;
 top:14px;
 z-index:4;
 width:74px;
 height:60px;
 display:grid;
 place-items:center;
 background:rgba(0,0,0,.45);
 color:#fff;
 font-size:0;
 font-weight:950;
}
.media:after{
 content:"#" attr(data-ticket);
 position:absolute;
 left:14px;
 top:14px;
 z-index:5;
 width:74px;
 height:60px;
 display:grid;
 place-items:center;
 background:rgba(0,0,0,.38);
 color:#fff;
 font-size:22px;
 font-weight:950;
}
.qOverlay{
 display:block;
 position:static!important;
 margin:0;
 padding:38px 34px;
 min-height:150px;
 border-radius:0;
 text-align:center;
 font-size:26px;
 line-height:1.45;
 font-weight:950;
 color:#fff;
 background:
  linear-gradient(180deg,rgba(14,63,75,.96),rgba(7,39,48,.98)),
  radial-gradient(circle at center,rgba(255,255,255,.12),transparent 45%);
 border-top:3px solid #fff;
 border-bottom:3px solid #fff;
 box-shadow:inset 0 0 0 34px rgba(255,255,255,0);
}
.qOverlay:before{
 content:"";
 display:block;
 position:absolute;
}
.content{padding:0}
.noImageQuestion{
 margin:0;
 padding:42px 34px;
 min-height:150px;
 border-radius:0;
 text-align:center;
 font-size:26px;
 line-height:1.45;
 font-weight:950;
 background:linear-gradient(180deg,#0e3f4b,#072730);
 border-top:3px solid #fff;
 border-bottom:3px solid #fff;
 color:#fff;
}
.answers{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:0;
 background:#fff;
 border-top:0;
}
.answer{
 position:relative;
 min-height:215px;
 padding:52px 48px 52px 126px;
 border:0;
 border-right:3px solid #fff;
 border-bottom:3px solid #fff;
 border-radius:0;
 background:linear-gradient(135deg,#082832,#174e5c);
 color:#fff;
 font-size:26px;
 line-height:1.35;
 font-weight:950;
 text-align:left;
 cursor:pointer;
 box-shadow:none;
}
.answer:nth-child(2n){border-right:0}
.answer:hover{
 transform:none;
 background:linear-gradient(135deg,#0a303b,#1d5a68);
}
.num{
 position:absolute;
 left:32px;
 top:50%;
 transform:translateY(-50%);
 width:62px;
 height:58px;
 border-radius:8px;
 display:grid;
 place-items:center;
 background:#fff;
 color:#073140;
 font-size:38px;
 font-weight:950;
}
.radio{display:none}
.answer.correct{
 background:linear-gradient(135deg,#15803d,#14532d)!important;
}
.answer.wrong{
 background:linear-gradient(135deg,#b91c1c,#7f1d1d)!important;
}
.next{
 display:block;
 margin:22px auto;
 min-width:280px;
 padding:18px 34px;
 border-radius:12px;
 background:#fff;
 color:#073140;
 border:0;
 font-size:20px;
 font-weight:950;
 cursor:pointer;
}

/* signMode საერთოდ არ ვანგრევთ — იგივე სტილი რჩება */
.media.signMode img{height:auto;max-height:345px;object-fit:contain;object-position:center}
.media.signMode .qOverlay{display:block}

.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.76);z-index:9999;padding:22px}
.modal.show{display:flex}
.box{width:min(650px,100%);background:#071b22;border:2px solid #fff;padding:30px;color:#fff}
.box p{line-height:1.7}
.box button{width:100%;padding:16px;border:0;background:#fff;color:#073140;font-weight:950}

@media(max-width:820px){
 .top{grid-template-columns:1fr}
 .stats{justify-content:flex-start}
 .media img{height:260px}
 .qOverlay,.noImageQuestion{padding:28px 18px;font-size:18px;min-height:120px}
 .answers{grid-template-columns:1fr}
 .answer{
  min-height:110px;
  padding:28px 22px 28px 88px;
  font-size:18px;
  border-right:0;
 }
 .num{left:22px;width:46px;height:44px;font-size:28px}
}
</style>
</head>
<body>
<div class="wrap">
 <div class="app">
  <div class="top">
   <div class="panel logo"><b>Drivelab</b><span>Adaptive premium theory exam</span></div>
   <div class="panel"><div class="timer" id="timer">30:00</div><div class="progress"><i id="progress"></i></div></div>
   <div class="panel"><div class="stats"><div>სწორი <b class="good" id="rightCount">0</b></div><div>არასწორი <b class="bad" id="wrongCount">0</b></div></div></div>
  </div>
  <div class="card">
   <div class="media" id="media"><img id="mainMedia" src=""><div class="qOverlay" id="qOverlay"></div></div>
   <div class="content" id="content"><div id="questionSlot"></div><div class="answers" id="answers"></div><button class="next" onclick="nextQuestion()">შემდეგი კითხვა ›</button></div>
  </div>
 </div>
</div>
<div class="modal" id="resultModal"><div class="box"><h2 id="resultTitle"></h2><p id="resultText"></p><button onclick="location.reload()">ახალი გამოცდა</button></div></div>

<script>
let questions=[],examQuestions=[],current=0,locked=false,right=0,wrong=0,answered=0,timeLeft=1800,finished=false;
const TOTAL=30,PASS=25,MAX_WRONG=5;
const $=id=>document.getElementById(id);
const media=$('media'),img=$('mainMedia'),qOverlay=$('qOverlay'),qSlot=$('questionSlot'),answers=$('answers'),content=$('content'),progress=$('progress'),timer=$('timer'),rightEl=$('rightCount'),wrongEl=$('wrongCount');

function asset(p){return p?p.replace(/^\/+/,''):''}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function isSignTopic(q){return Number(q.topic_id)>=3 && Number(q.topic_id)<=9}
function cutoffClass(q){
  const len=(q.question||'').length;
  const ansCount=(q.answers||[]).filter(a=>a.text).length;
  if(len>120 || ansCount>=4) return 'cutoff-3';
  if(len>75 || ansCount>=3) return 'cutoff-2';
  return 'cutoff-1';
}

fetch('data/questions.json?v='+Date.now()).then(r=>r.json()).then(d=>{questions=d;examQuestions=shuffle(d).slice(0,TOTAL);render();startTimer()});

function render(){
 locked=false;
 const q=examQuestions[current]; if(!q)return;
 const hasImage=!!q.image;
 const signMode=hasImage && isSignTopic(q);

 media.className='media';
 media.dataset.ticket = q.ticket_number || q.id || (current+1);
 media.classList.add(signMode?'signMode':'normalMode');
 media.classList.add(cutoffClass(q));

 if(hasImage){
  media.style.display='block';
  img.src=asset(q.image);

  if(signMode){
    qOverlay.style.display = 'block';
    qOverlay.textContent = q.question;
    qSlot.innerHTML = '';
  }else{
    qOverlay.style.display = 'none';
    qOverlay.textContent = '';
    qSlot.innerHTML = '<div class="noImageQuestion">'+q.question+'</div>';
  }
 }else{
  media.style.display='none';
  img.removeAttribute('src');
  qSlot.innerHTML='<div class="noImageQuestion">'+q.question+'</div>';
 }

 const next=document.querySelector('.next');
 if(signMode){
  if(answers.parentElement!==media) media.appendChild(answers);
 }else{
  if(answers.parentElement!==content) content.insertBefore(answers,next);
 }

 answers.innerHTML='';
 q.answers.forEach((a,i)=>{
  let b=document.createElement('button');
  b.className='answer';
  b.innerHTML=`<span class="num">${i+1}</span><span>${a.text}</span><span class="radio"></span>`;
  b.onclick=()=>choose(b,a,q);
  answers.appendChild(b);
 });
}

function choose(btn,a,q){
 if(locked||finished)return;
 locked=true;answered++;
 document.querySelectorAll('.answer').forEach(b=>b.disabled=true);
 if(a.is_correct){btn.classList.add('correct');right++}
 else{btn.classList.add('wrong');wrong++;[...answers.children].forEach((b,i)=>{if(q.answers[i]?.is_correct)b.classList.add('correct')})}
 update();
 if(wrong>MAX_WRONG)setTimeout(()=>finish(false),700);
 else if(answered>=TOTAL)setTimeout(()=>finish(right>=PASS),700);
}

function nextQuestion(){if(finished)return;if(answered>=TOTAL){finish(right>=PASS);return}current=(current+1)%examQuestions.length;render()}
function update(){rightEl.textContent=right;wrongEl.textContent=wrong;progress.style.width=Math.min(100,answered/TOTAL*100)+'%'}
function startTimer(){setInterval(()=>{if(finished)return;timeLeft--;let m=String(Math.floor(timeLeft/60)).padStart(2,'0'),s=String(timeLeft%60).padStart(2,'0');timer.textContent=m+':'+s;if(timeLeft<=0)finish(right>=PASS)},1000)}
function finish(pass){finished=true;$('resultTitle').textContent=pass?'გილოცავთ, გამოცდა ჩაბარებულია!':'გამოცდა ვერ ჩააბარეთ';$('resultText').textContent=`სწორი: ${right}/${TOTAL}, არასწორი: ${wrong}. ჩასაბარებლად საჭიროა ${PASS}.`;$('resultModal').classList.add('show')}
</script>
</body>
</html>
