<!doctype html>
<html lang="ka">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drivelab Theory</title>
<style>
*{box-sizing:border-box}
:root{--bg:#070707;--gold:#c7a45a;--gold2:#efd89a;--cream:#f4efe5;--muted:#aaa39a;--good:#22c55e;--bad:#ef4444}
body{margin:0;font-family:Arial,sans-serif;color:var(--cream);background:radial-gradient(circle at 75% 8%,rgba(199,164,90,.18),transparent 28%),linear-gradient(120deg,#070707,#11100d 48%,#050505)}
.wrap{max-width:1180px;margin:auto;padding:24px}
.app{border:1px solid rgba(199,164,90,.25);border-radius:34px;background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025));box-shadow:0 40px 120px rgba(0,0,0,.55);padding:22px}
.top{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:18px}
.panel{padding:16px;border-radius:24px;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.10)}
.logo b{font-size:26px}.logo span{display:block;color:var(--muted);font-size:13px;margin-top:4px}
.timer{font-size:34px;font-weight:950;color:var(--gold2)}
.stats{display:flex;gap:14px;justify-content:flex-end}.stats b{font-size:28px}.good{color:#86efac}.bad{color:#fca5a5}
.progress{height:10px;border-radius:99px;background:rgba(255,255,255,.10);overflow:hidden;margin-top:12px}.progress i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold2),var(--gold))}
.card{overflow:hidden;border-radius:30px;border:1px solid rgba(199,164,90,.25);background:linear-gradient(180deg,#171717,#080808)}
.media{position:relative;overflow:hidden;border-radius:26px;margin:18px auto;max-width:1040px;box-shadow:0 35px 100px rgba(0,0,0,.45)}
.media img{width:100%;display:block}
.media .qOverlay{position:absolute;left:18px;right:18px;bottom:18px;z-index:5;margin:0;padding:16px 22px;border-radius:18px;text-align:center;font-size:22px;line-height:1.4;font-weight:850;background:rgba(5,10,20,.72);border:1px solid rgba(255,255,255,.10);backdrop-filter:blur(14px)}
.content{padding:24px}
.noImageQuestion{margin:0 0 26px;padding:46px;border-radius:30px;text-align:center;font-size:30px;line-height:1.6;font-weight:950;background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025));border:1px solid rgba(199,164,90,.32)}
.answers{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.answer{position:relative;min-height:128px;padding:26px 70px 26px 92px;border-radius:26px;background:radial-gradient(circle at 18% 14%,rgba(199,164,90,.10),transparent 30%),linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.022));border:1px solid rgba(199,164,90,.22);box-shadow:0 20px 60px rgba(0,0,0,.28);color:var(--cream);font-size:20px;line-height:1.5;font-weight:900;text-align:left;cursor:pointer}
.answer:hover{transform:translateY(-2px);border-color:rgba(199,164,90,.55)}
.num{position:absolute;left:24px;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:17px;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#111;font-size:26px;font-weight:950}
.radio{position:absolute;right:24px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.35)}
.answer.correct{background:linear-gradient(135deg,rgba(34,197,94,.30),rgba(20,83,45,.92));border-color:rgba(34,197,94,.85)}
.answer.wrong{background:linear-gradient(135deg,rgba(239,68,68,.30),rgba(127,29,29,.92));border-color:rgba(239,68,68,.85)}
.answer.correct .radio:after{content:"✓";display:grid;place-items:center;height:100%;color:#86efac;font-size:22px;font-weight:950}
.answer.wrong .radio:after{content:"×";display:grid;place-items:center;height:100%;color:#fecaca;font-size:26px;font-weight:950}
.next{display:block;margin:28px auto 0;min-width:280px;padding:18px 34px;border-radius:22px;background:linear-gradient(135deg,#11100d,#070707);border:1px solid rgba(199,164,90,.75);color:var(--gold2);font-size:20px;font-weight:950;cursor:pointer}
.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.76);backdrop-filter:blur(16px);z-index:9999;padding:22px}.modal.show{display:flex}
.box{width:min(650px,100%);border-radius:32px;background:linear-gradient(180deg,#171717,#070707);border:1px solid rgba(199,164,90,.30);padding:30px;box-shadow:0 40px 130px rgba(0,0,0,.78)}
.box p{color:#d9d4cb;line-height:1.7}.box button{width:100%;padding:16px;border:0;border-radius:18px;background:linear-gradient(135deg,var(--gold2),var(--gold));font-weight:950}
@media(max-width:820px){.top{grid-template-columns:1fr}.stats{justify-content:flex-start}.answers{grid-template-columns:1fr}.answer{min-height:110px;padding:22px 56px 22px 76px;font-size:18px}.num{left:18px;width:40px;height:40px}.radio{right:18px}.media .qOverlay{font-size:16px;left:12px;right:12px;bottom:12px}.noImageQuestion{font-size:22px;padding:30px 22px}}

/* Teoria-style image ticket layout */
.media.imageMode{
  position:relative!important;
  overflow:hidden!important;
  max-width:1040px!important;
  margin:18px auto!important;
  border-radius:26px!important;
}

.media.imageMode::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:58%;
  background:linear-gradient(to top,rgba(5,10,20,.98),rgba(5,10,20,.92) 65%,rgba(5,10,20,0));
  z-index:2;
  pointer-events:none;
}

.media.imageMode .qOverlay{
  position:absolute!important;
  left:22px!important;
  right:22px!important;
  bottom:210px!important;
  z-index:4!important;
  padding:18px 22px!important;
  border-radius:18px!important;
  background:rgba(5,10,20,.72)!important;
  border:1px solid rgba(255,255,255,.12)!important;
  backdrop-filter:blur(14px)!important;
  font-size:22px!important;
  line-height:1.35!important;
}

.media.imageMode .answers{
  position:absolute!important;
  left:22px!important;
  right:22px!important;
  bottom:22px!important;
  z-index:5!important;
  display:grid!important;
  grid-template-columns:repeat(2,1fr)!important;
  gap:12px!important;
}

.media.imageMode .answer{
  min-height:82px!important;
  padding:18px 56px 18px 72px!important;
  border-radius:16px!important;
  font-size:16px!important;
}

.media.imageMode .num{
  left:18px!important;
  width:38px!important;
  height:38px!important;
  font-size:22px!important;
  border-radius:12px!important;
}

.media.imageMode .radio{
  right:18px!important;
  width:26px!important;
  height:26px!important;
}

@media(max-width:820px){
  .media.imageMode .qOverlay{
    bottom:190px!important;
    font-size:15px!important;
  }
  .media.imageMode .answers{
    grid-template-columns:1fr!important;
  }
}

</style>
</head>
<body>
<div class="wrap">
 <div class="app">
  <div class="top">
   <div class="panel logo"><b>Drivelab</b><span>Teoria.on clean database</span></div>
   <div class="panel"><div class="timer" id="timer">30:00</div><div class="progress"><i id="progress"></i></div></div>
   <div class="panel"><div class="stats"><div>სწორი <b class="good" id="rightCount">0</b></div><div>არასწორი <b class="bad" id="wrongCount">0</b></div></div></div>
  </div>
  <div class="card">
   <div class="media" id="media"><img id="mainMedia" src=""><div class="qOverlay" id="qOverlay"></div></div>
   <div class="content"><div id="questionSlot"></div><div class="answers" id="answers"></div><button class="next" onclick="nextQuestion()">შემდეგი კითხვა ›</button></div>
  </div>
 </div>
</div>
<div class="modal" id="resultModal"><div class="box"><h2 id="resultTitle"></h2><p id="resultText"></p><button onclick="location.reload()">ახალი გამოცდა</button></div></div>
<script>
let questions=[],examQuestions=[],current=0,locked=false,right=0,wrong=0,answered=0,timeLeft=1800,finished=false;
const TOTAL=30,PASS=25,MAX_WRONG=5;
const $=id=>document.getElementById(id);
const media=$('media'),img=$('mainMedia'),qOverlay=$('qOverlay'),qSlot=$('questionSlot'),answers=$('answers'),progress=$('progress'),timer=$('timer'),rightEl=$('rightCount'),wrongEl=$('wrongCount');
function asset(p){return p?p.replace(/^\/+/,''):''}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
fetch('data/questions.json?v='+Date.now()).then(r=>r.json()).then(d=>{questions=d;examQuestions=shuffle(d).slice(0,TOTAL);render();startTimer()});

function render(){
 locked=false;
 const q=examQuestions[current]; if(!q)return;

 if(q.image){
  media.style.display='block';
  media.classList.add('imageMode');
  img.src=asset(q.image);
  qOverlay.textContent=q.question;
  qSlot.innerHTML='';

  if(answers.parentElement !== media){
    media.appendChild(answers);
  }
 }else{
  media.style.display='none';
  media.classList.remove('imageMode');
  img.removeAttribute('src');
  qSlot.innerHTML='<div class="noImageQuestion">'+q.question+'</div>';

  const content=document.querySelector('.content');
  const next=document.querySelector('.next');
  if(answers.parentElement !== content){
    content.insertBefore(answers,next);
  }
 }

 answers.innerHTML='';
 q.answers.forEach((a,i)=>{
  let b=document.createElement('button');
  b.className='answer';
  b.innerHTML=`<span class="num">${i+1}</span><span>${a.text}</span><span class="radio"></span>`;
  b.onclick=()=>choose(b,a,q);
  answers.appendChild(b);
 });
}

function choose(btn,a,q){
 if(locked||finished)return;locked=true;answered++;document.querySelectorAll('.answer').forEach(b=>b.disabled=true);
 if(a.is_correct){btn.classList.add('correct');right++}else{btn.classList.add('wrong');wrong++;[...answers.children].forEach((b,i)=>{if(q.answers[i]?.is_correct)b.classList.add('correct')})}
 update();
 if(wrong>MAX_WRONG)setTimeout(()=>finish(false),700);else if(answered>=TOTAL)setTimeout(()=>finish(right>=PASS),700)
}
function nextQuestion(){if(finished)return;if(answered>=TOTAL){finish(right>=PASS);return}current=(current+1)%examQuestions.length;render()}
function update(){rightEl.textContent=right;wrongEl.textContent=wrong;progress.style.width=Math.min(100,answered/TOTAL*100)+'%'}
function startTimer(){setInterval(()=>{if(finished)return;timeLeft--;let m=String(Math.floor(timeLeft/60)).padStart(2,'0'),s=String(timeLeft%60).padStart(2,'0');timer.textContent=m+':'+s;if(timeLeft<=0)finish(right>=PASS)},1000)}
function finish(pass){finished=true;$('resultTitle').textContent=pass?'გილოცავთ, გამოცდა ჩაბარებულია!':'გამოცდა ვერ ჩააბარეთ';$('resultText').textContent=`სწორი: ${right}/${TOTAL}, არასწორი: ${wrong}. ჩასაბარებლად საჭიროა ${PASS}.`;$('resultModal').classList.add('show')}
</script>
</body>
</html>
