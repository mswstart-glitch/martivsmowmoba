<!doctype html>
<html lang="ka">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drivelab Theory</title>
<style>
*{box-sizing:border-box}
:root{--blue:#073946;--blue2:#052831;--white:#fff;--good:#22c55e;--bad:#ef4444}
body{margin:0;font-family:Arial,sans-serif;background:#d7d7d7;color:#fff}
.wrap{max-width:1500px;margin:0 auto;padding:0}
.app{min-height:100vh;background:#d7d7d7}
.top{display:none}
.card{position:relative;overflow:hidden;background:#d7d7d7}
.media{position:relative;margin:0 auto;width:100%;max-width:1500px;background:#d7d7d7;overflow:hidden;border-radius:0}
.media img{display:block;width:100%;height:auto;object-fit:contain}
.media:after{
 content:"#" attr(data-ticket);
 position:absolute;left:14px;top:14px;z-index:30;
 width:78px;height:62px;display:grid;place-items:center;
 background:rgba(0,0,0,.55);color:#fff;font-size:24px;font-weight:950;
}

/* =======================================================================
   NORMAL MODE — teoria.on.ge-ის მსგავსი სტრუქტურა (ვიზუალური ანალიზის მიხედვით)
   ეს ფოტოები თავიდანვე შეიცავს ქვედა ველს (ძველი UI ბლოკი, ბრაუზერზე
   უხილავი). გაზომვით დადგინდა, რომ ეს ველი 1006x632 ფოტოში იწყება
   ზუსტად 464px-დან (73.42%) — მუდმივი პროპორციაა ყველა ჩვეულებრივ
   ფოტოზე, კითხვის სიგრძის მიუხედავად. ჩვენი overlay ზუსტად ამ ველს
   ფარავს mask-ით, ფოტოს ზედა ნაწილს (მანქანები/ისრები) საერთოდ არ ეხება.
   ========================================================================= */
.media.normalMode{position:relative;aspect-ratio:1006/632;background:#050505}
.media.normalMode img{width:100%;height:100%;object-fit:contain;display:block}

.media.normalMode .zone{
 position:absolute;left:0;right:0;bottom:0;
 top:73.3%;
 display:grid;
 grid-template-rows:46.4% 53.6%;
 z-index:15;
 box-shadow:0 -2px 0 0 var(--blue2);
}
.media.normalMode.wideZone .zone{top:36.9%;grid-template-rows:32.2% 67.8%}

.media.normalMode .zone .qOverlay{
 display:flex!important;
 align-items:center;justify-content:center;text-align:center;
 min-height:0;
 overflow:hidden;
 padding:clamp(3px,1.3vw,22px) clamp(8px,3vw,34px);
 background:linear-gradient(180deg,#0a3846,var(--blue2));
 color:#fff;font-weight:900;
 font-size:clamp(9px,1.9vw,24px);
 line-height:1.18;
 border-top:2px solid rgba(255,255,255,.92);
}
.media.normalMode.wideZone .zone .qOverlay{font-size:clamp(11px,2.2vw,26px)}
.media.normalMode.cutoff-2 .zone .qOverlay{font-size:clamp(8px,1.6vw,20px)}
.media.normalMode.cutoff-3 .zone .qOverlay{font-size:clamp(7px,1.3vw,16px);line-height:1.12}

/* პასუხის რეალური ტექსტი ხშირად სრული ფრაზაა (არა მხოლოდ ციფრი), ამიტომ
   2x2 ბადეს ვინარჩუნებთ — თუ პასუხი კენტი რაოდენობაა, ბოლო მთელ სიგანეზე ჯდება. */
.media.normalMode .zone .answers{
 display:grid;grid-template-columns:repeat(2,1fr);gap:0;
 background:#fff;
 min-height:0;
 overflow:hidden;
}
.media.normalMode .zone .answer{
 position:relative;
 display:flex;align-items:center;
 min-height:0;
 padding:clamp(1px,0.7vw,10px) clamp(6px,2vw,26px) clamp(1px,0.7vw,10px) clamp(22px,5.6vw,60px);
 border:0;
 border-right:1px solid #fff;border-bottom:1px solid #fff;
 border-radius:0;
 background:linear-gradient(135deg,#062a34,#164d5a);
 color:#fff;
 font-size:clamp(7.5px,1.35vw,16px);
 line-height:1.14;
 font-weight:800;
 text-align:left;
 cursor:pointer;
 overflow:hidden;
}
.media.normalMode .zone .answer:nth-child(2n){border-right:0}
.media.normalMode .zone .answer.full{grid-column:1/-1;border-right:0}
.media.normalMode .zone .answer:hover{background:linear-gradient(135deg,#07313d,#1c5b69)}
.media.normalMode .zone .num{
 position:absolute;left:clamp(2px,0.6vw,5px);top:50%;transform:translateY(-50%);
 width:clamp(13px,3vw,30px);height:clamp(12px,2.6vw,26px);border-radius:2px;
 display:grid;place-items:center;
 background:#fff;color:#073946;font-size:clamp(8px,1.5vw,17px);font-weight:950;
}
.media.normalMode .zone .radio{display:none}
.media.normalMode.ansLen-2 .zone .answer{font-size:clamp(7px,1.15vw,13px)}
.media.normalMode.ansLen-3 .zone .answer{font-size:clamp(6.5px,1vw,11px);line-height:1.08;padding-top:1px;padding-bottom:1px}

/* no image */
.noImageQuestion{
 margin:0;
 padding:42px 34px;
 text-align:center;
 font-size:26px;
 line-height:1.45;
 font-weight:950;
 background:#073946;
 border-top:3px solid #fff;
 border-bottom:3px solid #fff;
}

/* =======================================================================
   SIGN MODE — რაც იყო, იმას არ ვანგრევთ (topic_id 3-9, უცვლელი)
   ========================================================================= */
.media.signMode{
 aspect-ratio:1006/632;
 max-width:1040px;
 background:#050505;
}
.media.signMode img{width:100%;height:100%;object-fit:contain}
.media.signMode .qOverlay{
 position:absolute!important;
 left:20px;right:20px;
 bottom:180px;
 z-index:10;
 padding:18px 22px;
 border-radius:0;
 text-align:center;
 font-size:20px;
 line-height:1.4;
 font-weight:950;
 background:rgba(5,35,43,.86);
 border:2px solid rgba(255,255,255,.75);
}
.media.signMode .answers{
 position:absolute;
 left:20px;right:20px;bottom:20px;
 z-index:11;
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:12px;
}
.media.signMode .answer{
 position:relative;
 min-height:74px;
 padding:16px 50px 16px 68px;
 border-radius:0;
 background:linear-gradient(135deg,#062a34,#164d5a);
 border:1px solid rgba(255,255,255,.7);
 color:#fff;
 font-size:15.5px;
 line-height:1.35;
 font-weight:900;
 text-align:left;
 cursor:pointer;
}
.media.signMode .num{
 position:absolute;left:16px;top:50%;transform:translateY(-50%);
 width:36px;height:36px;border-radius:4px;
 display:grid;place-items:center;
 background:#fff;color:#073946;font-size:21px;font-weight:950;
}
.media.signMode .radio{display:none}

.answer.correct{background:linear-gradient(135deg,#15803d,#14532d)!important}
.answer.wrong{background:linear-gradient(135deg,#b91c1c,#7f1d1d)!important}

.next{
 display:block;
 margin:22px auto;
 min-width:280px;
 padding:18px 34px;
 border-radius:12px;
 background:#fff;
 color:#073946;
 border:0;
 font-size:20px;
 font-weight:950;
 cursor:pointer;
}

.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.76);z-index:9999;padding:22px}
.modal.show{display:flex}
.box{width:min(650px,100%);background:#071b22;border:2px solid #fff;padding:30px;color:#fff}
.box p{line-height:1.7}
.box button{width:100%;padding:16px;border:0;background:#fff;color:#073946;font-weight:950}

@media(max-width:820px){
 .media.signMode{max-width:100%}
 .media.signMode .answers{grid-template-columns:1fr}
 .media.signMode .qOverlay{bottom:250px;font-size:14px}
 .media.signMode .answer{min-height:52px;font-size:13px}
}
</style>
</head>
<body>
<div class="wrap">
 <div class="app">
  <div class="top">
   <div class="panel logo"><b>Drivelab</b><span>Adaptive premium theory exam</span></div>
   <div class="panel"><div class="timer" id="timer">30:00</div><div class="progress"><i id="progress"></i></div></div>
   <div class="panel"><div class="stats"><div>სწორი <b class="good" id="rightCount">0</b></div><div>არასწორი <b class="bad" id="wrongCount">0</b></div></div></div>
  </div>
  <div class="card">
   <div class="media" id="media"><img id="mainMedia" src=""><div class="qOverlay" id="qOverlay"></div><div class="zone" id="zone"></div></div>
   <div class="content" id="content"><div id="questionSlot"></div><div class="answers" id="answers"></div><button class="next" onclick="nextQuestion()">შემდეგი კითხვა ›</button></div>
  </div>
 </div>
</div>
<div class="modal" id="resultModal"><div class="box"><h2 id="resultTitle"></h2><p id="resultText"></p><button onclick="location.reload()">ახალი გამოცდა</button></div></div>

<script>
let questions=[],examQuestions=[],current=0,locked=false,right=0,wrong=0,answered=0,timeLeft=1800,finished=false;
const TOTAL=30,PASS=25,MAX_WRONG=5;
const $=id=>document.getElementById(id);
const media=$('media'),img=$('mainMedia'),qOverlay=$('qOverlay'),zone=$('zone'),qSlot=$('questionSlot'),answers=$('answers'),content=$('content'),progress=$('progress'),timer=$('timer'),rightEl=$('rightCount'),wrongEl=$('wrongCount');

function asset(p){return p?p.replace(/^\/+/,''):''}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function isSignTopic(q){
  const id = Number(q.topic_id);
  const txt = ((q.topic_name||'')+' '+(q.question||'')).toLowerCase();
  return (id>=3 && id<=9)
    || txt.includes('საგზაო ნიშ')
    || txt.includes('ნიშანი')
    || txt.includes('ნიშნის')
    || txt.includes('მოცემული საგზაო');
}
function cutoffClass(q){
  const len=(q.question||'').length;
  const ansCount=(q.answers||[]).filter(a=>a.text).length;
  if(len>120 || ansCount>=4) return 'cutoff-3';
  if(len>75 || ansCount>=3) return 'cutoff-2';
  return 'cutoff-1';
}
/* normalMode-ის პასუხის ტექსტი ხშირად სრული ფრაზაა (არა მხოლოდ ციფრი) —
   ცალკე კლასი პასუხის შრიფტის ზომისთვის, რომ cutoffClass()-ის (საერთო,
   signMode-საც რომ ეხება) ლოგიკას არაფერი დავამატოთ. */
function answerLenClass(q){
  const maxLen = Math.max(0, ...(q.answers||[]).map(a=>(a.text||'').length));
  if(maxLen>90) return 'ansLen-3';
  if(maxLen>40) return 'ansLen-2';
  return 'ansLen-1';
}
/* ფოტოებში ('images/ticket_N.jpg') ეს კონკრეტული ბილეთები სხვა შაბლონით
   არის გამომუშავებული (რამდენიმე thumbnail ზემოთ + დიდი ცარიელი ველი
   ქვემოთ) — გაზომვით ძველი ველი იწყება 234/632-დან (36.9%), არა 464/632-დან. */
const WIDE_ZONE_IMAGES = new Set(['images/ticket_261.jpg','images/ticket_262.jpg','images/ticket_263.jpg','images/ticket_264.jpg','images/ticket_265.jpg','images/ticket_266.jpg','images/ticket_838.jpg']);

fetch('data/questions.json?v='+Date.now()).then(r=>r.json()).then(d=>{questions=d;examQuestions=shuffle(d).slice(0,TOTAL);render();startTimer()});

function render(){
 locked=false;
 const q=examQuestions[current]; if(!q)return;
 const hasImage=!!q.image;
 const signMode=hasImage && isSignTopic(q);

 media.className='media';
 media.dataset.ticket = q.ticket_number || q.id || (current+1);
 media.classList.add(signMode?'signMode':'normalMode');
 media.classList.add(cutoffClass(q));
 if(!signMode && hasImage){
  media.classList.add(answerLenClass(q));
  if(WIDE_ZONE_IMAGES.has(q.image)) media.classList.add('wideZone');
 }

 if(hasImage){
  media.style.display='block';
  img.src=asset(q.image);
  qOverlay.textContent = q.question;
  qSlot.innerHTML = '';

  if(signMode){
    qOverlay.style.display = 'block';
    if(qOverlay.parentElement!==media) media.insertBefore(qOverlay, zone);
    if(answers.parentElement!==media) media.appendChild(answers);
  }else{
    qOverlay.style.display = 'none';
    if(qOverlay.parentElement!==zone) zone.appendChild(qOverlay);
    if(answers.parentElement!==zone) zone.appendChild(answers);
    qOverlay.style.display = 'flex';
  }
 }else{
  media.style.display='none';
  img.removeAttribute('src');
  qSlot.innerHTML='<div class="noImageQuestion">'+q.question+'</div>';
  const next=document.querySelector('.next');
  if(answers.parentElement!==content) content.insertBefore(answers,next);
 }

 answers.innerHTML='';
 q.answers.forEach((a,i)=>{
  let b=document.createElement('button');
  b.className='answer';
  b.innerHTML=`<span class="num">${i+1}</span><span>${a.text}</span><span class="radio"></span>`;
  b.onclick=()=>choose(b,a,q);
  answers.appendChild(b);
 });
 if(!signMode && hasImage && q.answers.length%2===1){
  answers.lastElementChild.classList.add('full');
 }
}

function choose(btn,a,q){
 if(locked||finished)return;
 locked=true;answered++;
 document.querySelectorAll('.answer').forEach(b=>b.disabled=true);
 if(a.is_correct){btn.classList.add('correct');right++}
 else{btn.classList.add('wrong');wrong++;[...answers.children].forEach((b,i)=>{if(q.answers[i]?.is_correct)b.classList.add('correct')})}
 update();
 if(wrong>MAX_WRONG)setTimeout(()=>finish(false),700);
 else if(answered>=TOTAL)setTimeout(()=>finish(right>=PASS),700);
}

function nextQuestion(){if(finished)return;if(answered>=TOTAL){finish(right>=PASS);return}current=(current+1)%examQuestions.length;render()}
function update(){rightEl.textContent=right;wrongEl.textContent=wrong;progress.style.width=Math.min(100,answered/TOTAL*100)+'%'}
function startTimer(){setInterval(()=>{if(finished)return;timeLeft--;let m=String(Math.floor(timeLeft/60)).padStart(2,'0'),s=String(timeLeft%60).padStart(2,'0');timer.textContent=m+':'+s;if(timeLeft<=0)finish(right>=PASS)},1000)}
function finish(pass){finished=true;$('resultTitle').textContent=pass?'გილოცავთ, გამოცდა ჩაბარებულია!':'გამოცდა ვერ ჩააბარეთ';$('resultText').textContent=`სწორი: ${right}/${TOTAL}, არასწორი: ${wrong}. ჩასაბარებლად საჭიროა ${PASS}.`;$('resultModal').classList.add('show')}
</script>
</body>
</html>
